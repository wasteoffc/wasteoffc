<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wasteoffc</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

body {
    min-height: 100vh;
    color: white;
    overflow-x: hidden;
    position: relative;
}

/* GIF фон */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("https://image2url.com/r2/default/gifs/1772462807420-13ff4131-2f4d-471d-9efa-159f2f09606b.gif") no-repeat center center;
    background-size: cover;
    z-index: -2;
}

/* затемнение */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* ===== WARNING SCREEN ===== */

#warning {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 1s ease;
}

.warning-box {
    text-align: center;
    color: #4da6ff;
    font-family: 'Orbitron', sans-serif;
    padding: 20px;
}

.warning-box h1 { font-size: 32px; min-height: 40px; }
.warning-box p { color: #aaa; min-height: 24px; margin-top: 10px; }

#hackBtn {
    margin-top: 25px;
    background: #4da6ff;
    border: none;
    padding: 12px 30px;
    font-size: 16px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    display: none;
}

#hackBtn:hover { transform: scale(1.1); }

.glitch { animation: glitch 0.15s infinite; }

@keyframes glitch {
    0% { transform: translate(2px, -2px); }
    25% { transform: translate(-2px, 2px); }
    50% { transform: translate(2px, 2px); }
    75% { transform: translate(-2px, -2px); }
    100% { transform: translate(0); }
}

#hackProgressContainer {
    width: 250px;
    height: 8px;
    background: #111;
    margin: 20px auto 10px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #4da6ff;
    display: none;
}

#hackProgressBar {
    height: 100%;
    width: 0%;
    background: #4da6ff;
}

#hackPercent {
    color: #4da6ff;
    font-size: 14px;
    display: none;
}

/* ===== САЙТ ===== */

#siteContent {
    filter: blur(12px);
    transition: filter 1s ease;
}

.container {
    max-width: 900px;
    margin: 60px auto;
    padding: 20px;
    text-align: center;
}

/* 🔥 ФИКС ДЛЯ ГИФОК */
.title-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: nowrap;
}

.side-gif {
    width: 70px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.7));
}

h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 52px;
}

.subtitle { color: #aaa; margin-bottom: 15px; }

.section {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 20px;
    margin: 20px 0;
    border-radius: 15px;
    transition: 0.3s;
}

.section:hover {
    transform: scale(1.03);
    background: rgba(255,255,255,0.1);
}

.section h2 { margin-bottom: 15px; color: #4da6ff; }

ul { list-style: none; }
li { margin: 8px 0; color: #ddd; }

.player {
    margin-top: 30px;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
}

.play-btn {
    background: #4da6ff;
    border: none;
    padding: 10px 20px;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
}

.progress-container {
    margin-top: 15px;
    background: #333;
    border-radius: 10px;
    cursor: pointer;
}

.progress {
    height: 8px;
    width: 0%;
    background: #4da6ff;
    border-radius: 10px;
}

footer { margin-top: 40px; font-size: 14px; color: #ccc; }

/* 📱 MOBILE FIX */
@media (max-width: 600px) {

    .side-gif { width: 35px; }

    h1 { font-size: 32px; }

    .title-wrapper { gap: 10px; }

    #hackProgressContainer { width: 200px; }
}
</style>
</head>

<body>
