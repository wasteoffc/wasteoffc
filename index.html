<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

body {
    height: 100vh;
    color: white;
    overflow-x: hidden;
    position: relative;
}

/* GIF фон */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("https://image2url.com/r2/default/gifs/1772462807420-13ff4131-2f4d-471d-9efa-159f2f09606b.gif") no-repeat center center;
    background-size: cover;
    z-index: -2;
}

/* Затемнение */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: -1;
}

.container {
    max-width: 900px;
    margin: 80px auto;
    padding: 20px;
    text-align: center;
}

/* === ЗАГОЛОВОК === */

.title-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;
}

.side-gif {
    width: 70px;
    height: auto;
    filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.7));
    animation: glowPulse 2.5s ease-in-out infinite;
    transition: transform 0.3s ease;
}

.side-gif:hover {
    transform: scale(1.1);
}

@keyframes glowPulse {
    0% {
        filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.6));
    }
    50% {
        filter: drop-shadow(0 0 18px rgba(255, 255, 255, 1));
    }
    100% {
        filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.6));
    }
}

h1 { 
    font-family: 'Orbitron', sans-serif;
    font-size: 52px;
    letter-spacing: 3px;
}

@media (max-width: 600px) {
    .side-gif {
        width: 40px;
    }

    h1 {
        font-size: 34px;
    }
}

/* ============================ */

.subtitle { color: #aaa; margin-bottom: 40px; }

.section {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 20px;
    margin: 20px 0;
    border-radius: 15px;
    transition: 0.3s;
}

.section:hover {
    transform: scale(1.03);
    background: rgba(255,255,255,0.1);
}

.section h2 { margin-bottom: 15px; color: #4da6ff; }

ul { list-style: none; }
li { margin: 8px 0; color: #ddd; }

.player {
    margin-top: 30px;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
}

.play-btn {
    background: #4da6ff;
    border: none;
    padding: 10px 20px;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
}

.progress-container {
    margin-top: 15px;
    background: #333;
    border-radius: 10px;
    cursor: pointer;
}

.progress {
    height: 8px;
    width: 0%;
    background: #4da6ff;
    border-radius: 10px;
}

footer { margin-top: 40px; font-size: 14px; color: #ccc; }
</style>
</head>
